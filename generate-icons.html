<!DOCTYPE html>
<html>
<head>
  <title>HYDR801 Icon Generator</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; background: #f5f5f5; }
    .container { max-width: 600px; margin: 0 auto; text-align: center; }
    canvas { border: 1px solid #ddd; margin: 20px; background: white; }
    button { background: #4A6741; color: white; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 10px; border-radius: 8px; }
    button:hover { background: #5B7B50; }
    h1 { color: #4A6741; }
    p { color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌿 HYDR801 Icon Generator</h1>
    <p>Click the buttons below to download your app icons</p>
    
    <canvas id="icon192" width="192" height="192"></canvas>
    <canvas id="icon512" width="512" height="512"></canvas>
    
    <br>
    <button onclick="downloadIcon(192)">Download icon-192.png</button>
    <button onclick="downloadIcon(512)">Download icon-512.png</button>
    
    <p style="margin-top: 40px; font-size: 14px;">
      After downloading, place these files in the <code>public/</code> folder
    </p>
  </div>

  <script>
    function drawIcon(size) {
      const canvas = document.getElementById(size === 192 ? 'icon192' : 'icon512');
      const ctx = canvas.getContext('2d');
      const scale = size / 512;
      
      // Background
      ctx.fillStyle = '#4A6741';
      roundRect(ctx, 0, 0, size, size, 50 * scale);
      ctx.fill();
      
      // Water drop shape
      ctx.fillStyle = '#FAF9F7';
      ctx.beginPath();
      const cx = size / 2;
      const cy = size / 2;
      const dropSize = size * 0.35;
      
      // Draw water drop
      ctx.moveTo(cx, cy - dropSize);
      ctx.bezierCurveTo(
        cx + dropSize * 0.8, cy - dropSize * 0.2,
        cx + dropSize * 0.8, cy + dropSize * 0.6,
        cx, cy + dropSize
      );
      ctx.bezierCurveTo(
        cx - dropSize * 0.8, cy + dropSize * 0.6,
        cx - dropSize * 0.8, cy - dropSize * 0.2,
        cx, cy - dropSize
      );
      ctx.fill();
      
      // Plus sign inside drop
      ctx.fillStyle = '#4A6741';
      const plusSize = size * 0.08;
      const plusWidth = size * 0.03;
      ctx.fillRect(cx - plusWidth/2, cy - plusSize, plusWidth, plusSize * 2);
      ctx.fillRect(cx - plusSize, cy - plusWidth/2, plusSize * 2, plusWidth);
      
      // Text at bottom
      ctx.fillStyle = '#FAF9F7';
      ctx.font = `bold ${size * 0.08}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('HYDR801', cx, size * 0.88);
    }
    
    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }
    
    function downloadIcon(size) {
      const canvas = document.getElementById(size === 192 ? 'icon192' : 'icon512');
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    // Draw icons on load
    drawIcon(192);
    drawIcon(512);
  </script>
</body>
</html>
